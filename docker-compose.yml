services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: sqlite:////data/db/huishouden.db
    volumes:
      - ./data:/data
      - ./scripts:/scripts:ro   # voor: docker compose run --rm backend python /scripts/hash_password.py
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"   # Tailscale Serve op de mini-PC wijst naar deze poort
    restart: unless-stopped

  backup:
    image: alpine:3.20
    env_file: .env
    volumes:
      - ./data:/data
      - ./scripts/backup.sh:/backup.sh:ro
    command: /bin/sh /backup.sh
    restart: unless-stopped
