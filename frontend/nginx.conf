server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API naar de backend-container; cookies blijven same-origin
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # .webmanifest zit niet in nginx' standaard mime.types; zonder juist
    # mime-type weigeren browsers de PWA-installatie stilletjes.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    # SPA-fallback: onbekende paden naar index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
